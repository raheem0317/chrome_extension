<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Form Filler</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>AI Form Filler</h1>
      <div id="statusIndicator" class="status-indicator">
        <span class="status-dot"></span>
        <span class="status-text">Ready</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- API Key Section -->
      <section class="section api-section">
        <h2>API Configuration</h2>
        <div class="form-group">
          <label for="apiKey">Groq API Key</label>
          <input 
            type="password" 
            id="apiKey" 
            class="input-field" 
            placeholder="Enter your Groq API key (starts with gsk_)"
          >
          <button type="button" id="saveApiKeyBtn" class="btn btn-secondary">
            Save API Key
          </button>
        </div>
      </section>

      <!-- Profile Section -->
      <section class="section profile-section">
        <h2>Your Profile</h2>
        <form id="profileForm" class="profile-form" autocomplete="off">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input 
              type="text" 
              id="name" 
              name="name" 
              class="input-field" 
              placeholder="Enter your full name"
              required
            >
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              class="input-field" 
              placeholder="Enter your email"
              required
            >
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input 
              type="tel" 
              id="phone" 
              name="phone" 
              class="input-field" 
              placeholder="Enter your phone number"
            >
          </div>

          <div class="form-group">
            <label for="address">Address</label>
            <input 
              type="text" 
              id="address" 
              name="address" 
              class="input-field" 
              placeholder="Enter your address"
            >
          </div>

          <div class="form-group">
            <label for="skills">Skills</label>
            <textarea 
              id="skills" 
              name="skills" 
              class="input-field textarea" 
              rows="3" 
              placeholder="List your skills (comma separated)"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="experience">Experience</label>
            <textarea 
              id="experience" 
              name="experience" 
              class="input-field textarea" 
              rows="4" 
              placeholder="Describe your work experience"
            ></textarea>
          </div>

          <button type="submit" class="btn btn-primary" id="saveProfileBtn">
            Save Profile
          </button>
        </form>
      </section>
    </main>

    <!-- Footer with Fill Button -->
    <footer class="footer">
      <div class="footer-actions">
        <div class="toggle-group">
          <label class="switch">
            <input type="checkbox" id="reviewModeToggle" checked>
            <span class="slider round"></span>
          </label>
          <span class="toggle-label">Review before fill</span>
        </div>
        <button id="fillFormBtn" class="btn btn-large btn-fill">
          <span class="btn-icon">⚡</span>
          <span id="fillBtnText">Review & Fill</span>
        </button>
      </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden" role="alert" aria-live="polite">
      <span id="toastMessage"></span>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden" aria-hidden="true">
      <div class="spinner"></div>
      <p id="loadingText">Processing...</p>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
